<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Guide - Voice Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
    <div class="container">
        <h1>Autonomous Virtual Travel Guide</h1>

        <!-- Voice Assistant Section -->
        <div class="feature-section">
            <h2><i class="fas fa-comment-dots"></i>Voice Assistant</h2>
            
            <div class="voice-container">
                <div class="voice-visualization">
                    <div class="voice-wave" id="voice-wave">
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                    </div>
                </div>
                
                <div class="button-container">
                    <button class="button mic-button" id="mic-button">
                        <i class="fas fa-microphone" id="mic-icon"></i>
                        <span id="mic-text">Press to talk</span>
                    </button>
                </div>
                
                <div class="status-indicator" id="voice-status"></div>
                
                <div class="conversation-container">
                    <div class="conversation-header">Conversation</div>
                    <div class="conversation" id="conversation-log"></div>
                </div>
                
                <div class="audio-controls" id="audio-controls" style="display: none;">
                    <div class="audio-progress">
                        <div class="audio-progress-bar" id="audio-progress-bar"></div>
                    </div>
                    <button class="control-button" id="pause-button">
                        <i class="fas fa-pause"></i>
                    </button>
                    <button class="control-button" id="stop-button">
                        <i class="fas fa-stop"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
