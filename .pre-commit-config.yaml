# .pre-commit-config.yaml
repos:
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.1
    hooks:
    # Fix code style issues automatically
    -   id: ruff
        args: [
            --fix,  # Auto-fix issues
            --unsafe-fixes,  # Enable additional auto-fixes
            --line-length=88,
            --select=I,B,E,T,A,UP
        ]
    # Format code automatically
    -   id: ruff-format
        args: [--line-length=88]

-   repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
    -   id: isort
        args: [
            --profile=black,
            --atomic,  # Write files in-place
            --apply    # Apply fixes
        ]

-   repo: https://github.com/asottile/pyupgrade
    rev: v3.15.0
    hooks:
    -   id: pyupgrade
        args: [
            --py38-plus,  # Use Python 3.8+ features
            --keep-runtime-typing
        ]

-   repo: https://github.com/PyCQA/autoflake
    rev: v2.2.1
    hooks:
    -   id: autoflake
        args: [
            --in-place,
            --remove-all-unused-imports,
            --remove-unused-variables,
            --remove-duplicate-keys,
            --recursive
        ]

# Add Vulture to find dead code
-   repo: https://github.com/jendrikseipp/vulture
    rev: v2.10
    hooks:
    -   id: vulture
        args: [
            "webapp/",  # Scan the current directory
            "--min-confidence=80",  # Set minimum confidence for detecting unused code
            "--exclude=.venv/*,venv/*,.env/*,env/*",  # Exclude virtual environments
        ]